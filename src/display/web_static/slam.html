<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SLAM Viewer</title>
  <link rel="stylesheet" href="/static/slam.css">
  <script>
    if (new URLSearchParams(location.search).get('embedded') === '1') {
      document.documentElement.classList.add('embedded');
    }
  </script>
  <script>
    window.SLAM_CONFIG = {
      baseMapFile: 'global_map_ds.pcd',
      baseMapTransform: null,
      enableVoxelInfill: true,
      voxelInfillSize: 0.2,    // 大地图：0.1 会产 ~24.6w 虚拟点；0.2 降到 ~7.7w，回到性能预算内
      accumulateVoxelSize: 0.05,
      accumulateMaxPoints: 150000,
      enableNoFlyZoneDraw: true,
      enableGraspTask: true,
      lowPerfMode: false,
    };
  </script>
</head>
<body>

<div id="slam-app">

  <div class="slam-topbar">
    <a class="back-link" href="/">← 返回</a>
    <div class="title">SLAM Viewer</div>
    <button id="btn-nofly-draw" class="slam-btn topbar-btn" type="button">禁飞区</button>
    <button id="btn-grasp-draw" class="slam-btn topbar-btn" type="button">抓取</button>
    <button id="btn-defview" class="slam-btn topbar-btn" type="button" title="设定双击复位的默认视角：点击后平移定中心、缩放定高度，再点一次保存">默认视角</button>
    <button id="btn-defview-clear" class="slam-btn topbar-btn" type="button" title="清除已保存的默认视角，回到斜视默认视角（横滑翻滚时点这个复位）">清除视角</button>
    <button id="btn-panmode" class="slam-btn topbar-btn" type="button" title="平移模式：开启后只能拖动平移，关闭旋转和飞行缩放">平移</button>
    <div class="conn-badge disconnected">OFFLINE</div>
  </div>

  <canvas id="slam-canvas"></canvas>

  <button id="btn-nofly-fab" class="slam-btn nofly-fab" type="button">禁飞区</button>
  <button id="btn-grasp-fab" class="slam-btn grasp-fab" type="button">抓取</button>
  <button id="btn-defview-fab" class="slam-btn defview-fab" type="button">默认视角</button>
  <button id="btn-defview-clear-fab" class="slam-btn defview-clear-fab" type="button">清除视角</button>
  <button id="btn-panmode-fab" class="slam-btn panmode-fab" type="button">平移</button>

  <div id="nofly-panel" class="nofly-panel hidden">
    <div class="nofly-panel-head">
      <span>禁飞区</span>
      <button id="btn-nofly-arm" class="slam-btn" type="button">开始框选</button>
      <button id="btn-nofly-send" class="slam-btn" type="button">下发</button>
      <button id="btn-nofly-clear" class="slam-btn" type="button">清空</button>
    </div>
    <div id="nofly-list" class="nofly-list"></div>
  </div>

  <div id="grasp-panel" class="grasp-panel hidden">
    <div class="grasp-panel-head">
      <span>抓取目标</span>
      <button id="btn-grasp-arm" class="slam-btn" type="button">开始框选</button>
      <button id="btn-grasp-send" class="slam-btn" type="button">下发</button>
      <button id="btn-grasp-clear" class="slam-btn" type="button">清除</button>
    </div>
    <div id="grasp-info" class="grasp-info">暂无目标,点击"开始框选"在地图上框出抓取区域,后端会取中心点下发。</div>
  </div>

  <div class="slam-statusbar">
    <span id="stat-base">基底: -</span>
    <span id="stat-map">累积: -</span>
    <span id="stat-scan">实时: -</span>
    <span id="stat-pose">位姿: -</span>
    <span id="stat-fps">FPS: -</span>
    <button id="btn-clear-accum" class="slam-btn">清除累积</button>
  </div>

</div>

<!--
  three.js 通过 ES module 加载. 默认从 /static/vendor/ 取本地副本.
  详见 web_static/vendor/README.md (本地放置说明).
-->
<script type="importmap">
{
  "imports": {
    "three": "/static/vendor/three.module.min.js",
    "three/addons/": "/static/vendor/three-addons/"
  }
}
</script>
<script type="module" src="/static/slam.js?v=21"></script>

</body>
</html>
