<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平板直连 TTS PoC</title>
<style>
  body { font-family: -apple-system, sans-serif; margin: 0; padding: 16px; background: #1a1a1a; color: #e0e0e0; }
  h1 { font-size: 18px; margin: 0 0 12px; color: #fff; }
  textarea { width: 100%; min-height: 80px; padding: 8px; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
  button { padding: 14px 28px; margin: 12px 8px 12px 0; font-size: 16px; border: none; border-radius: 4px; background: #4a90e2; color: #fff; cursor: pointer; }
  button:disabled { background: #555; cursor: wait; }
  button.secondary { background: #666; }
  #log { background: #0a0a0a; padding: 12px; border-radius: 4px; font-family: monospace; font-size: 13px; min-height: 200px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
  .row { display: flex; gap: 16px; margin-top: 12px; }
  .stat { background: #2a2a2a; padding: 12px; border-radius: 4px; flex: 1; }
  .stat-label { font-size: 12px; color: #999; }
  .stat-value { font-size: 24px; font-weight: bold; color: #4a90e2; margin-top: 4px; }
  .ok { color: #4caf50; }
  .err { color: #f44336; }
  .warn { color: #ff9800; }
</style>
</head>
<body>
  <h1>平板直连 TTS PoC — 测网络首块延迟</h1>
  <textarea id="text">你好呀你好呀,这是一段火山豆包语音合成首块延迟测试文本。</textarea>
  <div>
    <button id="btn-test">测试 qwen-tts</button>
    <button id="btn-clear" class="secondary">清空日志</button>
  </div>
  <div class="row">
    <div class="stat"><div class="stat-label">HTTP 响应头到达</div><div class="stat-value" id="s-headers">-</div></div>
    <div class="stat"><div class="stat-label">★ 首块 PCM 到达</div><div class="stat-value" id="s-first">-</div></div>
    <div class="stat"><div class="stat-label">全部完成</div><div class="stat-value" id="s-end">-</div></div>
  </div>
  <h3 style="margin-top:16px;font-size:14px;">运行日志</h3>
  <div id="log"></div>
<script src="/static/tts_poc.js"></script>
</body>
</html>
